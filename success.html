<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoostLab | Заявката е изпратена</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b0f18;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:#151c2d;
padding:50px;
border-radius:20px;
text-align:center;
max-width:500px;
width:90%;
box-shadow:0 0 40px rgba(0,140,255,.2);
}

.check{
font-size:70px;
margin-bottom:20px;
color:#00bfff;
}

h1{
margin-bottom:15px;
}

p{
opacity:.8;
margin-bottom:30px;
}

a{
display:inline-block;
padding:15px 35px;
background:#00bfff;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:.3s;
}

a:hover{
background:#0099dd;
}
</style>

</head>

<body>

<div class="card">

<div class="check">✔</div>

<h1>Заявката е изпратена успешно!</h1>

<p>
Получихме поръчката ти.
Ще се свържем с теб възможно най-скоро чрез имейла, който си посочил.
</p>

<a href="/">Обратно към сайта</a>

</div>

</body>
</html>
